<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | EESJ</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-slate-50 font-['Inter'] flex items-center justify-center min-h-screen p-4">

    <div class="bg-white border border-slate-200 rounded-xl shadow-sm max-w-md w-full p-8">

        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-slate-100 text-slate-700 mb-4 shadow-inner">
                <i class="fa-solid fa-lock text-2xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-800">Área Restrita</h2>
            <p class="text-sm text-slate-500 mt-1">Acesso exclusivo para administração</p>
        </div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="bg-rose-50 border-l-4 border-rose-500 text-rose-700 p-4 rounded-md mb-6 text-sm flex items-center shadow-sm"
            role="alert">
            <i class="fa-solid fa-circle-exclamation mr-3 text-lg"></i>
            <span class="font-medium">{{ messages[0] }}</span>
        </div>
        {% endif %}
        {% endwith %}

        <form method="post" class="space-y-5">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div>
                <label for="senha" class="block text-sm font-semibold text-slate-700 mb-1">Senha de Acesso</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-key text-slate-400"></i>
                    </div>
                    <input type="password" name="senha" id="senha"
                        class="block w-full pl-10 pr-3 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-slate-800 placeholder-slate-400 bg-slate-50 focus:bg-white"
                        placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit"
                class="w-full bg-slate-800 text-white font-medium py-3 rounded-lg hover:bg-slate-700 transition-colors shadow-sm flex items-center justify-center gap-2">
                Entrar no Painel <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </form>

        <div class="mt-8 text-center border-t border-slate-100 pt-4">
            <a href="/" class="text-sm text-slate-500 hover:text-slate-800 transition-colors font-medium">
                <i class="fa-solid fa-arrow-left mr-1"></i> Voltar ao site público
            </a>
        </div>
    </div>

</body>

</html>
