{% extends "layout.html" %}

{% block conteudo %}

<div class="pb-12">

    <div class="card flex flex-col sm:flex-row items-start sm:items-end gap-4">

        <div class="flex-1 w-full sm:max-w-[200px]">
            <label class="block text-sm font-semibold text-slate-700 mb-1">
                Mês
            </label>
            <select id="filtroMes"
                class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 outline-none text-slate-700 transition-all shadow-sm bg-slate-50 focus:bg-white">
                <option value="01">Janeiro</option>
                <option value="02">Fevereiro</option>
                <option value="03" selected>Março</option>
                <option value="04">Abril</option>
                <option value="05">Maio</option>
                <option value="06">Junho</option>
                <option value="07">Julho</option>
                <option value="08">Agosto</option>
                <option value="09">Setembro</option>
                <option value="10">Outubro</option>
                <option value="11">Novembro</option>
                <option value="12">Dezembro</option>
            </select>
        </div>

        <div class="flex-1 w-full sm:max-w-[120px]">
            <label class="block text-sm font-semibold text-slate-700 mb-1">
                Ano
            </label>
            <select id="filtroAno"
                class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 outline-none text-slate-700 transition-all shadow-sm bg-slate-50 focus:bg-white">
                <option value="2025">2025</option>
                <option value="2026" selected>2026</option>
            </select>
        </div>

        <button onclick="carregarDados()" id="btnBuscar"
            class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-6 py-2.5 rounded-lg transition-colors flex items-center justify-center gap-2 shadow-sm">
            <i class="fa-solid fa-magnifying-glass"></i>
            Buscar Dados
        </button>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        window.onload = () => {
            const hoje = new Date();
            const ano = hoje.getFullYear();
            const mes = String(hoje.getMonth() + 1).padStart(2, '0');
            document.getElementById("mesSelecionado").value = `${ano}-${mes}`;
        };

        let chart;

        function carregarDados() {
            const mes = document.getElementById("filtroMes").value;
            const ano = document.getElementById("filtroAno").value;

            const msgVazia = document.getElementById("mensagemVazia");
            if (msgVazia) msgVazia.style.display = 'none';

            fetch(`/api/historico_mes?ano=${ano}&mes=${mes}`)
                .then(r => {
                    if (!r.ok) throw new Error("Sem dados para este período");
                    return r.json();
                })
                .then(dados => {
                    if (dados.length === 0) {
                        alert("Nenhum dado encontrado para este mês.");
                        return;
                    }

                    const dias = dados.map(d => d.dia);
                    const temp = dados.map(d => d.temperatura);
                    const chuva = dados.map(d => d.chuva);

                    const ctx = document.getElementById("graficoMes");
                    if (chart) chart.destroy();

                    chart = new Chart(ctx, {
                        type: "bar",
                        data: {
                            labels: dias,
                            datasets: [
                                {
                                    label: "Chuva (mm)",
                                    data: chuva,
                                    backgroundColor: 'rgba(59, 130, 246, 0.5)',
                                    borderColor: 'rgb(59, 130, 246)',
                                    borderWidth: 1
                                },
                                {
                                    type: "line",
                                    label: "Temp. Média (°C)",
                                    data: temp,
                                    borderColor: 'rgb(249, 115, 22)',
                                    backgroundColor: 'transparent',
                                    tension: 0.3
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false
                        }
                    });
                })
                .catch(err => {
                    console.error(err);
                    if (msgVazia) msgVazia.style.display = 'flex';
                });
        }
    </script>
    {% endblock %}
