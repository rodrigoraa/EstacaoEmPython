<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{{ titulo or "Estação Meteorológica" }}</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />

    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>

<body class="bg-slate-50 font-[Inter]">

    <div class="md:hidden bg-white border-b px-4 py-3 flex items-center justify-between sticky top-0 z-30">
        <span class="font-semibold text-slate-700">
            <i class="fa-solid fa-cloud-sun text-indigo-500 mr-2"></i>
            Estação Meteorológica
        </span>
        <button onclick="toggleMenu()" class="text-slate-700 text-2xl px-2">
            <i class="fa-solid fa-bars"></i>
        </button>
    </div>

    <div id="menuOverlay" onclick="toggleMenu()"
        class="fixed inset-0 bg-black/50 hidden z-40 md:hidden backdrop-blur-sm transition-opacity"></div>

    <aside id="menuLateral"
        class="fixed inset-y-0 left-0 h-screen w-64 bg-white border-r border-slate-200 p-6 z-50 transform -translate-x-full md:translate-x-0 transition-transform duration-300 overflow-y-auto">
        <h2 class="text-lg font-bold text-slate-800 mb-6 hidden md:block">
            <i class="fa-solid fa-cloud-sun text-indigo-500 mr-2"></i>
            Estação Meteorológica
        </h2>

        <nav class="space-y-2 text-sm">
            <a href="/"
                class="flex items-center gap-2 p-3 rounded-lg transition-colors {% if request.path == '/' %} bg-indigo-50 text-indigo-600 font-semibold {% else %} hover:bg-slate-100 text-slate-700 {% endif %}">
                <i class="fa-solid fa-house w-5"></i> Dashboard
            </a>
            <a href="/historico"
                class="flex items-center gap-2 p-3 rounded-lg transition-colors {% if request.path.startswith('/historico') %} bg-indigo-50 text-indigo-600 font-semibold {% else %} hover:bg-slate-100 text-slate-700 {% endif %}">
                <i class="fa-solid fa-chart-line w-5"></i> Histórico
            </a>
            <a href="/previsao"
                class="flex items-center gap-2 p-3 rounded-lg transition-colors {% if request.path.startswith('/previsao') %} bg-indigo-50 text-indigo-600 font-semibold {% else %} hover:bg-slate-100 text-slate-700 {% endif %}">
                <i class="fa-solid fa-cloud-sun-rain w-5"></i> Previsão do tempo
            </a>
            <a href="/sobre"
                class="flex items-center gap-2 p-3 rounded-lg transition-colors {% if request.path.startswith('/sobre') %} bg-indigo-50 text-indigo-600 font-semibold {% else %} hover:bg-slate-100 text-slate-700 {% endif %}">
                <i class="fa-solid fa-circle-info w-5"></i> Sobre a estação
            </a>
        </nav>
    </aside>

    <main class="w-full md:pl-64 min-h-screen flex flex-col">
        <div class="p-4 md:p-8">
            {% block conteudo %}{% endblock %}
        </div>
    </main>

    <script>
        function toggleMenu() {
            const menu = document.getElementById("menuLateral");
            const overlay = document.getElementById("menuOverlay");
            menu.classList.toggle("-translate-x-full");
            overlay.classList.toggle("hidden");
        }
    </script>
</body>

</html>
