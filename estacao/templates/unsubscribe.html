<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancelamento de Alertas | EESJ</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-slate-50 font-['Inter'] flex items-center justify-center min-h-screen p-4">

    <div class="bg-white border border-slate-200 rounded-xl shadow-sm max-w-md w-full p-8 text-center"
        style="border-top: 4px solid {{ estado.cor }};">

        <img src="{{ url_for('static', filename='logo.png') }}" alt="EESJ" class="h-12 mx-auto mb-6 opacity-80"
            onerror="this.style.display='none'">

        <div class="mx-auto flex items-center justify-center w-16 h-16 rounded-full mb-4 shadow-sm"
            style="background-color: {{ estado.cor }}15; color: {{ estado.cor }}; font-size: 1.75rem;">
            {{ estado.icone | safe }}
        </div>

        <h1 class="text-2xl font-bold mb-3" style="color: {{ estado.cor }};">
            {{ estado.titulo }}
        </h1>

        <div class="text-slate-500 mb-8 text-sm leading-relaxed">
            {{ estado.texto | safe }}
        </div>

        <a href="/"
            class="inline-block px-6 py-3 bg-slate-800 text-white font-medium text-sm rounded-lg hover:bg-slate-700 transition-colors w-full shadow-sm">
            Voltar ao Painel
        </a>
    </div>

</body>

</html>
